name: CI/CD Pipeline to GCP Cloud Run

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run MLOps Evaluation Harness (Pytest)
      env:
        # We must provide the API key so the test can actually reach Gemini
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python -m pytest tests/test_routing.py -v

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: metabolic-health-coach
        region: us-central1
        source: .
        env_vars: |-
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          FITBIT_CLIENT_ID=${{ secrets.FITBIT_CLIENT_ID }}
          CRON_SECRET_TOKEN=${{ secrets.CRON_SECRET_TOKEN }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}